<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>家計ノート</title>
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家計ノート">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="theme-color" content="#F2F2F7">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sec:#6e6e73;--ter:#aeaeb2;
--sep:#e5e5ea;--red:#ff3b30;--grn:#34c759;--blue:#007aff;--org:#ff9500;--pur:#af52de;
--r:16px;--sab:env(safe-area-inset-bottom,0px);--sat:env(safe-area-inset-top,0px);
--sh:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02)
}
body{
font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.4;
max-width:480px;margin:0 auto;
padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));
font-variant-numeric:tabular-nums
}

/* === Screens === */
.scr{display:none}.scr.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* === Top bar === */
.hd{padding:calc(16px + var(--sat)) 16px 10px;background:var(--bg);position:sticky;top:0;z-index:10}
.hd-row{display:flex;justify-content:space-between;align-items:center}
.hd-sub{font-size:12px;font-weight:500;color:var(--sec);text-transform:uppercase;letter-spacing:.5px}
.hd-t{font-size:17px;font-weight:700;margin-top:2px}
.hd-btn{width:28px;height:28px;border-radius:50%;background:var(--card);border:none;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);box-shadow:var(--sh)}
.hd-btn:active{transform:scale(.97)}

/* === Card === */
.cd{background:var(--card);border-radius:var(--r);margin:0 16px 12px;box-shadow:var(--sh);overflow:hidden}

/* === Budget === */
.bu{padding:16px}
.bu-l{font-size:11px;font-weight:600;color:var(--sec);text-transform:uppercase;letter-spacing:.5px}
.bu-row{display:flex;align-items:baseline;gap:6px;margin:6px 0 12px}
.bu-v{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
.bu-of{font-size:13px;color:var(--ter)}
.bar-t{height:6px;background:var(--sep);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;background:var(--text);transition:width .5s ease}

/* === Summary 3-col === */
.s3{display:flex;border-top:.5px solid var(--sep)}
.s3-c{flex:1;padding:12px 6px;text-align:center}
.s3-c+.s3-c{border-left:.5px solid var(--sep)}
.s3-v{font-size:14px;font-weight:700}.s3-l{font-size:10px;font-weight:600;color:var(--ter);margin-top:2px}

/* === Reward row === */
.rw{display:flex;align-items:center;padding:12px 16px;gap:8px;border-top:.5px solid var(--sep);cursor:pointer}
.rw-i{font-size:14px}.rw-t{flex:1;font-size:12px;font-weight:500;color:var(--sec)}.rw-v{font-size:14px;font-weight:700}
.rw-v.p{color:var(--grn)}.rw-v.n{color:var(--red)}
.rw-ch{color:var(--ter);font-size:10px;transition:transform .2s}.rw-ch.open{transform:rotate(90deg)}

/* === Reward panel === */
.rw-pan{border-top:.5px solid var(--sep);display:none;padding:0 16px 12px}
.rw-pan.open{display:block}
.rw-pan-head{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px}
.rw-pan-title{font-size:12px;font-weight:600}
.rw-pan-add{background:none;border:none;color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.rw-wish-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.rw-wish-item span{flex:1}
.rw-use-btn{width:100%;padding:8px;margin-top:6px;background:rgba(52,199,89,.06);border:1px solid rgba(52,199,89,.15);border-radius:10px;color:var(--grn);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}

/* === Section header === */
.sh{padding:20px 16px 6px;font-size:11px;font-weight:600;color:var(--sec);text-transform:uppercase;letter-spacing:.5px}

/* === Swipeable row === */
.swr{position:relative;overflow:hidden}
.swr+.swr{border-top:.5px solid var(--sep)}
.swr-l{position:absolute;left:0;top:0;bottom:0;width:76px;background:var(--text);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;cursor:pointer;z-index:1}
.swr-r{position:absolute;right:0;top:0;bottom:0;width:76px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;cursor:pointer;z-index:1}
.swr-c{position:relative;z-index:2;background:var(--card);display:flex;align-items:center;padding:9px 14px;gap:10px;min-height:44px;touch-action:pan-y;transition:transform .2s ease}
.swr-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(0,0,0,0.03)}
.swr-ic.trn{background:#EEF0FF}.swr-ic.fod{background:#FFF3E8}.swr-ic.dly{background:#F0F8F0}
.swr-ic.ent{background:#FFF0F5}.swr-ic.def{background:rgba(0,0,0,0.03)}.swr-ic.sub{background:#F3F0FF}.swr-ic.inc{background:#E8F8E8}
.swr-bd{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.swr-nm{font-size:14px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.swr-mt{font-size:11px;font-weight:500;color:var(--sec);white-space:nowrap;flex-shrink:0}
.swr-dt{color:var(--ter);font-size:8px;flex-shrink:0}
.swr-am{font-size:14px;font-weight:700;flex-shrink:0;text-align:right;min-width:56px}

/* === Stat grid === */
.sg{display:grid;grid-template-columns:1fr 1fr}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr}
.sg-c{padding:12px 10px;overflow:hidden}.sg-c-l{font-size:11px;font-weight:600;color:var(--sec);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.sg-c-v{font-size:20px;font-weight:700;letter-spacing:-1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sg-c-s{font-size:10px;font-weight:500;color:var(--ter);margin-top:2px}
.sg3 .sg-c-v{font-size:17px}
.sg-br{border-right:.5px solid var(--sep)}.sg-bb{border-bottom:.5px solid var(--sep)}

/* === Month bar === */
.mbar{height:7px;background:var(--sep);border-radius:4px;overflow:hidden;display:flex;margin:0 16px 6px}
.mbar-s{height:100%}
.mbar-lg{display:flex;gap:12px;padding:0 16px 14px;font-size:10px;font-weight:500;color:var(--sec)}
.mbar-lg span::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}

/* === Day row === */
.drow{display:flex;align-items:center;padding:10px 14px;gap:10px}
.drow+.drow{border-top:.5px solid var(--sep)}
.drow-d{width:36px;text-align:center;flex-shrink:0}
.drow-dn{font-size:17px;font-weight:700}.drow-dd{font-size:10px;font-weight:600;color:var(--ter)}
.drow-bar{flex:1;height:6px;background:var(--sep);border-radius:3px;overflow:hidden}
.drow-bf{height:100%;border-radius:3px;transition:width .5s ease}
.drow-a{font-size:13px;font-weight:700;text-align:right;width:56px;flex-shrink:0}
.drow-df{font-size:11px;font-weight:700;text-align:right;width:48px;flex-shrink:0}

/* === Breakdown row === */
.bkr{display:flex;align-items:center;padding:10px 14px;gap:10px}
.bkr+.bkr{border-top:.5px solid var(--sep)}
.bkr-ic{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.bkr-nm{flex:1;font-size:13px;font-weight:500}.bkr-am{font-size:13px;font-weight:700;flex-shrink:0}
.bkr-pc{font-size:10px;font-weight:600;color:var(--sec);width:32px;text-align:right;flex-shrink:0}

/* === Settings row === */
.str{display:flex;justify-content:space-between;align-items:center;padding:14px 14px;min-height:48px;cursor:pointer;border-bottom:.5px solid var(--sep)}
.str:last-child{border-bottom:none}
.str-l{font-size:14px;font-weight:400}.str-v{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--sec)}
.str-ch{color:var(--ter);font-size:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(0,0,0,0.03);border-radius:14px;font-size:12px;font-weight:500;margin:2px}
.chip-x{width:16px;height:16px;border-radius:50%;border:none;background:rgba(0,0,0,0.06);color:var(--sec);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chip-e{width:16px;height:16px;border-radius:50%;border:none;background:rgba(0,122,255,.1);color:var(--blue);font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* === Empty === */
.emp{padding:32px 16px;text-align:center;color:var(--ter);font-size:13px}
.emp-i{font-size:24px;margin-bottom:6px}

/* === Tab bar === */
.tab{
position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
display:flex;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:.5px solid var(--sep);
padding:6px 0 calc(16px + env(safe-area-inset-bottom,0px));
z-index:500
}
.tab-i{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;font-family:inherit;min-height:48px;padding:4px 0}
.tab-ic{width:26px;height:26px}
.tab-ic svg{width:26px;height:26px;fill:none;stroke:var(--ter);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.tab-i.on .tab-ic svg{stroke:var(--text)}
.tab-lb{font-size:10px;font-weight:600;color:var(--ter)}
.tab-i.on .tab-lb{color:var(--text)}

/* === FAB === */
.fab{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom,0px));right:16px;width:48px;height:48px;background:var(--text);border:none;border-radius:50%;color:#fff;font-size:26px;font-weight:300;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;z-index:499;transition:transform .15s}
.fab:active{transform:scale(.97)}

/* === Modal === */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:600;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mo-s{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:480px;padding:10px 20px calc(16px + var(--sab));animation:shu .25s cubic-bezier(.32,.72,0,1);max-height:85vh;overflow-y:auto}
@keyframes shu{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo-h{width:36px;height:4px;background:var(--ter);border-radius:2px;margin:0 auto 12px;opacity:.3}
.mo-t{font-size:17px;font-weight:700;margin-bottom:18px;text-align:center}
.fg{margin-bottom:16px}
.fl{font-size:12px;font-weight:600;color:var(--sec);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:14px 14px;border:.5px solid var(--sep);border-radius:12px;font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
.fi:focus{border-color:var(--text)}.fi::placeholder{color:var(--ter)}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:10px 16px;border:.5px solid var(--sep);border-radius:16px;font-size:14px;font-weight:500;cursor:pointer;background:var(--card);color:var(--sec);font-family:inherit;transition:all .2s}
.pill.on{background:var(--text);color:#fff;border-color:var(--text)}
.pill-add{padding:10px 16px;border:1px dashed var(--ter);border-radius:16px;font-size:14px;cursor:pointer;background:transparent;color:var(--ter);font-family:inherit}
.ia{display:none;gap:8px;margin-top:8px}.ia.on{display:flex}
.ia input{flex:1;padding:10px 12px;border:.5px solid var(--sep);border-radius:10px;font-size:16px;font-family:inherit;background:var(--bg);outline:none}
.ia button{padding:10px 16px;background:var(--text);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:6px}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--text);color:#fff}
.btn-s{background:rgba(0,0,0,0.03);color:var(--text);margin-top:8px}
.btn-d{background:rgba(255,59,48,.06);color:var(--red);font-weight:600;margin-top:8px}

/* === Review tabs (segment control) === */
.rvt{display:flex;background:var(--card);border-radius:14px;padding:3px;margin:0 16px 12px;box-shadow:var(--sh)}
.rvt-i{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;border-radius:11px;cursor:pointer;color:var(--sec);border:none;background:none;font-family:inherit;transition:all .2s;min-height:40px;display:flex;align-items:center;justify-content:center}
.rvt-i.on{background:var(--text);color:#fff}

/* === Toast === */
.dl-items{display:none}.dl-items.open{display:block!important}
.toast{position:fixed;top:calc(16px + var(--sat));left:50%;transform:translateX(-50%) translateY(-12px);background:var(--text);color:#fff;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ==================== TODAY ==================== -->
<div class="scr on" id="scr-today">
<div class="hd"><div class="hd-sub" id="hd-date"></div><div class="hd-t">Today</div></div>
<div class="cd">
  <div class="bu">
    <div class="bu-l">残り予算</div>
    <div class="bu-row"><span class="bu-v" id="bu-v"></span><span class="bu-of" id="bu-of"></span></div>
    <div class="bar-t"><div class="bar-f" id="bu-bar"></div></div>
  </div>
  <div class="s3">
    <div class="s3-c"><div class="s3-v" id="s-td"></div><div class="s3-l">今日</div></div>
    <div class="s3-c"><div class="s3-v" id="s-wk"></div><div class="s3-l" id="s-wk-l">今週</div></div>
    <div class="s3-c"><div class="s3-v" id="s-mo"></div><div class="s3-l">今月</div></div>
  </div>
  <div class="rw" id="rw-toggle"><span class="rw-i">🎁</span><span class="rw-t">ご褒美ストック</span><span class="rw-v p" id="rw-val"></span><span class="rw-ch" id="rw-ch">▸</span></div>
  <div class="rw-pan" id="rw-pan">
    <div class="rw-pan-head"><span class="rw-pan-title">欲しいものリスト</span><button class="rw-pan-add" id="btn-wish-add">+ 追加</button></div>
    <div id="wish-list"></div>
    <button class="rw-use-btn" id="btn-rw-use">ご褒美を使う</button>
  </div>
</div>
<div class="sh">支出 · 今日</div>
<div class="cd" id="td-cd"><div id="td-ls"></div></div>
<div class="emp" id="td-emp" style="display:none"><div class="emp-i">✨</div>まだ記録がありません</div>
</div>

<!-- ==================== SUBS ==================== -->
<div class="scr" id="scr-subs">
<div class="hd"><div class="hd-row"><div><div class="hd-t">サブスク</div><div class="hd-sub">固定費</div></div><button class="hd-btn" id="btn-sub-add">+</button></div></div>
<div class="cd"><div class="sg">
  <div class="sg-c sg-br sg-bb"><div class="sg-c-l">月額換算</div><div class="sg-c-v" id="sb-mt"></div></div>
  <div class="sg-c sg-bb"><div class="sg-c-l">年間</div><div class="sg-c-v" id="sb-yr"></div></div>
  <div class="sg-c sg-br"><div class="sg-c-l">件数</div><div class="sg-c-v" id="sb-ct"></div></div>
  <div class="sg-c"><div class="sg-c-l">次の支払い</div><div class="sg-c-v" id="sb-nx" style="font-size:13px"></div></div>
</div></div>
<div class="sh">登録中</div>
<div class="cd" id="sb-cd"><div id="sb-ls"></div></div>
</div>

<!-- ==================== INCOME ==================== -->
<div class="scr" id="scr-income">
<div class="hd"><div class="hd-row"><div><div class="hd-t">収入</div><div class="hd-sub" id="inc-pd"></div></div><button class="hd-btn" id="btn-inc-add">+</button></div></div>
<div class="cd"><div class="sg">
  <div class="sg-c sg-br sg-bb"><div class="sg-c-l">総支給額</div><div class="sg-c-v" id="inc-g"></div></div>
  <div class="sg-c sg-bb"><div class="sg-c-l">手取り</div><div class="sg-c-v" id="inc-n"></div></div>
  <div class="sg-c sg-br"><div class="sg-c-l">月給回数</div><div class="sg-c-v" id="inc-sc"></div></div>
  <div class="sg-c"><div class="sg-c-l">ボーナス</div><div class="sg-c-v" id="inc-bn"></div></div>
</div></div>
<div class="sh">履歴</div>
<div class="cd" id="inc-cd"><div id="inc-ls"></div></div>
</div>

<!-- ==================== REVIEW ==================== -->
<div class="scr" id="scr-review">
<div class="hd"><div class="hd-row"><div class="hd-t" id="rv-t">Review</div><div style="display:flex;gap:6px"><button class="hd-btn" onclick="A.rvNav(-1)">‹</button><button class="hd-btn" onclick="A.rvNav(1)">›</button></div></div></div>
<div class="rvt" id="rv-tabs"></div>
<div id="rv-ct"></div>
</div>

<!-- ==================== SETTINGS ==================== -->
<div class="scr" id="scr-settings">
<div class="hd"><div class="hd-t">Settings</div></div>
<div class="sh">予算</div>
<div class="cd">
  <div class="str" onclick="A.editS('budget')"><span class="str-l">1日の予算</span><span class="str-v"><span id="sv-b"></span><span class="str-ch">›</span></span></div>
  <div class="str" onclick="A.editS('limit')"><span class="str-l">月の上限</span><span class="str-v"><span id="sv-l"></span><span class="str-ch">›</span></span></div>
  <div class="str" onclick="A.editS('wife')"><span class="str-l">妻の生活費（今月）</span><span class="str-v"><span id="sv-w"></span><span class="str-ch">›</span></span></div>
</div>
<div class="sh">カテゴリ</div>
<div class="cd" style="padding:12px 14px" id="sv-cats"></div>
<div style="padding:0 16px"><button class="btn btn-s" id="btn-cat-add">カテゴリを追加</button></div>
<div class="sh" style="margin-top:14px">支払い方法</div>
<div class="cd" style="padding:12px 14px" id="sv-cards"></div>
<div style="padding:0 16px"><button class="btn btn-s" id="btn-card-add">支払い方法を追加</button></div>
<div class="sh" style="margin-top:14px">データ</div>
<div style="padding:0 16px"><button class="btn btn-s" onclick="A.doExport()">データをエクスポート</button></div>
<div style="height:40px"></div>
</div>

<!-- ==================== TAB BAR ==================== -->
<div class="tab">
<button class="tab-i on" data-s="today"><span class="tab-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg></span><span class="tab-lb">Today</span></button>
<button class="tab-i" data-s="subs"><span class="tab-ic"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="7" y1="15" x2="11" y2="15"/></svg></span><span class="tab-lb">サブスク</span></button>

<script>
/* ========== DATA ========== */
const KEY='kakeibo_v10';
const DCATS=[{id:'transport',name:'交通費',icon:'🚃',c:'trn'},{id:'food',name:'食費',icon:'🍱',c:'fod'},{id:'daily',name:'日用品',icon:'🧴',c:'dly'},{id:'entertainment',name:'娯楽',icon:'🎮',c:'ent'}];
const DCARDS=['現金','AMEX','三井住友','楽天'];
const WD=['日','月','火','水','木','金','土'],WDS=['月','火','水','木','金','土','日'];
const p2=n=>String(n).padStart(2,'0');
const $=id=>document.getElementById(id);
const Y=n=>n<0?`-¥${Math.abs(n).toLocaleString()}`:`¥${n.toLocaleString()}`;
const today=()=>{const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;};
const mkey=d=>{d=d||new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}`;};
const fmtDate=s=>{const d=new Date(s);return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${WD[d.getDay()]}曜日`;};
const dim=m=>{const[y,mo]=m.split('-').map(Number);return new Date(y,mo,0).getDate();};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,4);

function defaults(){return{settings:{dailyBudget:3000,monthlyLimit:500000,wifeExpenses:{},rewardStart:today()},categories:[...DCATS],cards:[...DCARDS],expenses:[],subscriptions:[],incomes:[],wishlist:[],rewardUses:[]};}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY));if(!d)return null;const s=d.settings||{};s.wifeExpenses=s.wifeExpenses||{};s.rewardStart=s.rewardStart||today();d.categories=d.categories||[...DCATS];d.cards=d.cards||[...DCARDS];d.incomes=d.incomes||[];d.wishlist=d.wishlist||[];d.rewardUses=d.rewardUses||[];(d.subscriptions||[]).forEach(x=>{x.cycle=x.cycle||'monthly';x.nextDate=x.nextDate||'';});return d;}catch{return null;}}
function save(){localStorage.setItem(KEY,JSON.stringify(D));}
let D=load()||defaults();if(!localStorage.getItem(KEY))save();

/* ========== HELPERS ========== */
const gc=id=>D.categories.find(c=>c.id===id)||{name:'その他',icon:'📌',c:'def'};
const tExp=()=>D.expenses.filter(e=>e.date===today());
const mExp=m=>D.expenses.filter(e=>e.date.startsWith(m));
const subMo=()=>D.subscriptions.reduce((s,x)=>s+(x.cycle==='yearly'?Math.round(x.amount/12):x.amount),0);
const subYr=()=>D.subscriptions.reduce((s,x)=>s+(x.cycle==='yearly'?x.amount:x.amount*12),0);
const wExp=m=>D.settings.wifeExpenses[m]||0;
function getMon(d){d=new Date(d);const dy=d.getDay();const df=d.getDate()-dy+(dy===0?-6:1);return new Date(d.getFullYear(),d.getMonth(),df);}
function wkRange(d){const m=getMon(d);const s=new Date(m);s.setDate(m.getDate()+6);return{m,s};}
function ds(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function wkExp(ref){const{m,s}=wkRange(ref);const a=ds(m),b=ds(s);return D.expenses.filter(e=>e.date>=a&&e.date<=b);}
function reward(mo){
  const now=new Date(),cm=mkey(now),ex=mExp(mo),bd={};
  ex.forEach(e=>{bd[e.date]=(bd[e.date]||0)+e.amount;});
  const[y,mn]=mo.split('-').map(Number);
  const cnt=mo===cm?now.getDate()-1:dim(mo);
  const start=D.settings.rewardStart||'2000-01-01';
  let r=0;
  for(let d=1;d<=cnt;d++){const s=`${y}-${p2(mn)}-${p2(d)}`;if(s<start)continue;r+=D.settings.dailyBudget-(bd[s]||0);}
  const used=D.rewardUses.filter(u=>u.date.startsWith(mo)).reduce((s,u)=>s+u.amount,0);
  return r-used;
}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1600);}

/* ========== SWIPE ========== */
function initSw(el){
  el.querySelectorAll('.swr').forEach(row=>{
    const c=row.querySelector('.swr-c');let sx,cx,sw=false,st=0,sy,vertical=false;
    c.addEventListener('touchstart',e=>{sx=cx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=true;vertical=false;c.style.transition='none';},{passive:true});
    c.addEventListener('touchmove',e=>{if(!sw)return;cx=e.touches[0].clientX;const cy=e.touches[0].clientY;if(!vertical&&Math.abs(cy-sy)>Math.abs(cx-sx)){vertical=true;}if(vertical){c.style.transform=st===1?'translateX(-76px)':st===-1?'translateX(76px)':'translateX(0)';return;}let dx=cx-sx+st*-76;c.style.transform=`translateX(${Math.max(-76,Math.min(76,dx))}px)`;},{passive:true});
    c.addEventListener('touchend',()=>{sw=false;c.style.transition='transform .2s ease';if(vertical){c.style.transform=st===1?'translateX(-76px)':st===-1?'translateX(76px)':'translateX(0)';return;}const dx=cx-sx;if(dx<-60&&st!==1){st=1;c.style.transform='translateX(-76px)';}else if(dx>60&&st!==-1){st=-1;c.style.transform='translateX(76px)';}else{st=0;c.style.transform='translateX(0)';}});
  });
}
function swHTML(ic,icon,name,meta,amt,editFn,delFn){
  return`<div class="swr"><div class="swr-l" onclick="${editFn}">編集</div><div class="swr-r" onclick="${delFn}">削除</div><div class="swr-c"><div class="swr-ic ${ic}">${icon}</div><div class="swr-bd"><span class="swr-nm">${name}</span><span class="swr-dt">·</span><span class="swr-mt">${meta}</span></div><span class="swr-am">${amt}</span></div></div>`;
}

/* ========== APP ========== */
const A={
  cur:'today',vm:mkey(),rvM:'week',rvOff:0,
  selC:'',selPay:'',editId:null,
  selCyc:'monthly',selSCC:'',editSubId:null,
  selIncT:'salary',editCatId:null,editSetF:'',

  /* --- NAV --- */
  go(s){
    this.cur=s;
    document.querySelectorAll('.scr').forEach(x=>x.classList.remove('on'));
    $('scr-'+s).classList.add('on');
    document.querySelectorAll('.tab-i').forEach(t=>t.classList.toggle('on',t.dataset.s===s));
    $('fab').style.display=s==='today'?'flex':'none';
    if(s==='review'){this.rvOff=0;this.renderReview();}
    this.render();
  },
  om(id){$(id).classList.add('on');},
  cm(id){$(id).classList.remove('on');},
  mout(e,id){if(e.target===$(id))this.cm(id);},
  showCfm(t,m,ok,fn){$('cfm-t').textContent=t;$('cfm-m').textContent=m;$('cfm-ok').textContent=ok;$('cfm-ok').onclick=()=>{fn();this.cm('mo-cfm');};this.om('mo-cfm');},

  /* --- RENDER --- */
  render(){this.rToday();this.rSubs();this.rIncome();this.rSettings();},

  rToday(){
    $('hd-date').textContent=fmtDate(today());
    const spent=tExp().reduce((s,e)=>s+e.amount,0);
    const rem=D.settings.dailyBudget-spent;
    const pct=Math.min(spent/D.settings.dailyBudget*100,100);
    $('bu-v').textContent=Y(rem);$('bu-v').style.color=rem<0?'var(--red)':'';
    $('bu-of').textContent=`/ ${Y(D.settings.dailyBudget)}`;
    const bar=$('bu-bar');bar.style.width=pct+'%';
    bar.style.background=pct>90?'var(--red)':'var(--text)';
    $('s-td').textContent=Y(spent);
    $('s-wk').textContent=Y(wkExp(new Date()).reduce((s,e)=>s+e.amount,0));
    $('s-mo').textContent=Y(mExp(mkey()).reduce((s,e)=>s+e.amount,0));
    const{m:mon,s:sun}=wkRange(new Date());
    $('s-wk-l').textContent=`今週 ${mon.getMonth()+1}/${mon.getDate()}-${sun.getMonth()+1}/${sun.getDate()}`;
    const rw=reward(mkey());$('rw-val').textContent=(rw>=0?'+':'')+Y(rw);
    $('rw-val').className='rw-v '+(rw>=0?'p':'n');
    // Wishlist
    const wl=$('wish-list');
    wl.innerHTML=D.wishlist.length?D.wishlist.map(w=>`<div class="rw-wish-item"><span>${w.name}</span><span style="color:${rw>=w.price?'var(--grn)':'var(--sec)'};font-weight:500;font-size:13px">${Y(w.price)}</span><button style="background:none;border:none;color:var(--ter);font-size:11px;cursor:pointer" onclick="event.stopPropagation();A.cfmDelWish('${w.id}')">×</button></div>`).join(''):'<div style="font-size:12px;color:var(--ter);padding:2px 0">まだ登録がありません</div>';
    // Entries
    const ents=tExp().sort((a,b)=>b.ts-a.ts);
    if(!ents.length){$('td-cd').style.display='none';$('td-emp').style.display='';return;}
    $('td-cd').style.display='';$('td-emp').style.display='none';
    const el=$('td-ls');
    el.innerHTML=ents.map(e=>{const c=gc(e.category);const t=new Date(e.ts);
      const usdInfo=e.usd?` · $${e.usdAmount}@${e.usdRate}`:'';
      return swHTML(c.c,c.icon,e.memo||c.name,`${c.name} · ${e.pay||''}${usdInfo} · ${t.getHours()}:${p2(t.getMinutes())}`,`-${Y(e.amount)}`,`A.editExp('${e.id}')`,`A.cfmDelExp('${e.id}')`);
    }).join('');initSw(el);
  },

  rSubs(){
    $('sb-mt').textContent=Y(subMo());$('sb-yr').textContent=Y(subYr());
    $('sb-ct').textContent=D.subscriptions.length;
    const now=today(),up=D.subscriptions.filter(s=>s.nextDate>=now).sort((a,b)=>a.nextDate.localeCompare(b.nextDate));
    $('sb-nx').textContent=up.length?`${up[0].name} ${up[0].nextDate.slice(5).replace('-','/')}`:'-';
    const cd=$('sb-cd');
    if(!D.subscriptions.length){cd.innerHTML='<div class="emp"><div class="emp-i">🔄</div>サブスク未登録</div>';return;}
    const el=document.createElement('div');
    el.innerHTML=D.subscriptions.sort((a,b)=>(a.nextDate||'z').localeCompare(b.nextDate||'z')).map(s=>{
      const cy=s.cycle==='yearly'?'年額':'月額';const nx=s.nextDate?s.nextDate.slice(5).replace('-','/'):'';
      return swHTML('sub','🔄',s.name,`${cy} · ${s.card||''} · 次回${nx}`,Y(s.amount),`A.editSub('${s.id}')`,`A.cfmDelSub('${s.id}')`);
    }).join('');cd.innerHTML='';cd.appendChild(el);initSw(el);
  },

  rIncome(){
    const cm=mkey();$('inc-pd').textContent=cm.replace('-','年')+'月';
    const mi=D.incomes.filter(i=>i.month===cm);
    $('inc-g').textContent=Y(mi.reduce((s,i)=>s+i.gross,0));
    $('inc-n').textContent=Y(mi.reduce((s,i)=>s+i.net,0));
    $('inc-sc').textContent=mi.filter(i=>i.type==='salary').length;
    $('inc-bn').textContent=Y(mi.filter(i=>i.type==='bonus').reduce((s,i)=>s+i.net,0));
    const cd=$('inc-cd');const all=D.incomes.sort((a,b)=>b.month.localeCompare(a.month));
    if(!all.length){cd.innerHTML='<div class="emp"><div class="emp-i">💰</div>収入データなし</div>';return;}
    const el=document.createElement('div');
    el.innerHTML=all.map(i=>{const tl=i.type==='salary'?'月給':'ボーナス';
      return swHTML('inc','💰',i.memo||tl,`${tl} · ${i.month.replace('-','/')} · 総支給${Y(i.gross)}`,Y(i.net),`A.editInc('${i.id}')`,`A.cfmDelInc('${i.id}')`);
    }).join('');cd.innerHTML='';cd.appendChild(el);initSw(el);
  },

  rSettings(){
    $('sv-b').textContent=Y(D.settings.dailyBudget);$('sv-l').textContent=Y(D.settings.monthlyLimit);
    $('sv-w').textContent=Y(wExp(mkey()));
    $('sv-cats').innerHTML=D.categories.map(c=>`<span class="chip">${c.icon} ${c.name}<button class="chip-e" onclick="A.editCat('${c.id}')">✎</button><button class="chip-x" onclick="A.cfmDelCat('${c.id}')">×</button></span>`).join('');
    $('sv-cards').innerHTML=D.cards.map((c,i)=>`<span class="chip">💳 ${c}<button class="chip-x" onclick="A.cfmDelCard(${i})">×</button></span>`).join('');
  },

  /* --- REVIEW --- */
  rvNav(d){this.rvOff+=d;this.renderReview();},
  rvMode(m){this.rvM=m;this.rvOff=0;this.renderReview();},
  renderReview(){
    const modes=['week','month','daily','category','card','reward'],labels=['週次','月次','日別','カテゴリ','カード','ご褒美'];
    $('rv-tabs').innerHTML=modes.map((m,i)=>`<button class="rvt-i${m===this.rvM?' on':''}" onclick="A.rvMode('${m}')">${labels[i]}</button>`).join('');
    const ct=$('rv-ct'),tt=$('rv-t');
    const ref=new Date();
    if(this.rvM==='week'){
      ref.setDate(ref.getDate()+this.rvOff*7);const{m:mon,s:sun}=wkRange(ref);
      tt.textContent=`${mon.getMonth()+1}/${mon.getDate()} - ${sun.getMonth()+1}/${sun.getDate()}`;
      const exps=wkExp(ref),total=exps.reduce((s,e)=>s+e.amount,0),bud=D.settings.dailyBudget*7,diff=bud-total;
      const bd={};for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);bd[ds(d)]=0;}
      exps.forEach(e=>{if(bd[e.date]!==undefined)bd[e.date]+=e.amount;});
      const mx=Math.max(...Object.values(bd),D.settings.dailyBudget);

  /* --- CURRENCY --- */
  expCur:'jpy',subCur:'jpy',

  /* --- EXPENSE --- */
  openExpM(id){
    this.editId=id||null;const isE=!!id;
    $('mo-exp-t').textContent=isE?'支出を編集':'支出を記録';
    $('mo-exp-btn').textContent=isE?'保存する':'記録する';

      if(e.usd){this.setCur('usd');$('i-amt').value=e.usdAmount;$('i-rate').value=e.usdRate;this.calcJpy();}
    }else{$('i-amt').value='';$('i-memo').value='';$('i-rate').value='';this.selC=D.categories[0]?.id||'';this.selPay=D.cards[0]||'';}
    $('ia-cat').classList.remove('on');

  },
  rCatPills(){$('pills-cat').innerHTML=D.categories.map(c=>`<button class="pill${c.id===this.selC?' on':''}" onclick="A.selC='${c.id}';A.rCatPills()">${c.icon} ${c.name}</button>`).join('')+`<button class="pill-add" onclick="$('ia-cat').classList.add('on')">+ 新規</button>`;},
  rPayPills(){$('pills-pay').innerHTML=D.cards.map(c=>`<button class="pill${c===this.selPay?' on':''}" onclick="A.selPay='${c}';A.rPayPills()">${c}</button>`).join('');},
  inlineAddCat(){const n=$('ia-cn').value.trim(),i=$('ia-ci').value.trim()||'📌';if(!n){toast('名前を入力');return;}const id=uid();D.categories.push({id,name:n,icon:i,c:'def'});this.selC=id;save();$('ia-cn').value='';$('ia-ci').value='';$('ia-cat').classList.remove('on');this.rCatPills();toast('追加しました');},
  addExp(){
    let amt;const memo=$('i-memo').value.trim();
    let usdData=null;
    if(this.expCur==='usd'){
      const usdAmt=parseFloat($('i-amt').value),rate=parseFloat($('i-rate').value);
      if(!usdAmt||usdAmt<=0||!rate||rate<=0){toast('金額と為替を入力');return;}
      amt=Math.round(usdAmt*rate);usdData={usdAmount:usdAmt,usdRate:rate};
    }else{
      amt=parseInt($('i-amt').value);
      if(!amt||amt<=0){toast('金額を入力');return;}
    }
    if(this.editId){const e=D.expenses.find(x=>x.id===this.editId);if(e){e.amount=amt;e.memo=memo;e.category=this.selC||'default';e.pay=this.selPay;e.usd=!!usdData;if(usdData){e.usdAmount=usdData.usdAmount;e.usdRate=usdData.usdRate;}else{delete e.usd;delete e.usdAmount;delete e.usdRate;}}}
    else{const entry={id:uid(),date:today(),ts:Date.now(),amount:amt,memo,category:this.selC||'default',pay:this.selPay};if(usdData){entry.usd=true;entry.usdAmount=usdData.usdAmount;entry.usdRate=usdData.usdRate;}D.expenses.push(entry);}
    this.editId=null;save();this.cm('mo-exp');toast('記録しました ✓');this.render();if(this.cur==='review')this.renderReview();
  },
  editExp(id){this.openExpM(id);},
  editExpFrom(id){this.openExpM(id);},
  cfmDelExp(id){this.showCfm('支出を削除','この記録を削除しますか？','削除する',()=>{D.expenses=D.expenses.filter(e=>e.id!==id);save();toast('削除しました');this.render();this.renderReview();});},
  cfmDelExpRv(id){this.showCfm('支出を削除','この記録を削除しますか？','削除する',()=>{D.expenses=D.expenses.filter(e=>e.id!==id);save();toast('削除しました');this.render();this.renderReview();});},

    else{const entry={id:uid(),name:n,amount:a,day:1,card:this.selSCC,cycle:this.selCyc,nextDate:nx};if(usdData){entry.usd=true;entry.usdAmount=usdData.usdAmount;entry.usdRate=usdData.usdRate;}D.subscriptions.push(entry);}

  },
  editInc(id){toast('編集は準備中');},
  cfmDelInc(id){this.showCfm('収入を削除','削除しますか？','削除する',()=>{D.incomes=D.incomes.filter(i=>i.id!==id);save();toast('削除しました');this.render();});},

  /* --- SETTINGS --- */
  editS(f){this.editSetF=f;const t={budget:'1日の予算',limit:'月の上限',wife:'妻の生活費（今月）'};$('mo-set-t').textContent=t[f];$('mo-set-l').textContent='金額（円）';const cur=f==='budget'?D.settings.dailyBudget:f==='limit'?D.settings.monthlyLimit:wExp(mkey());$('i-sv').value=cur;this.om('mo-set');setTimeout(()=>$('i-sv').focus(),250);},
  saveS(){const v=parseInt($('i-sv').value);if(isNaN(v)||v<0){toast('正しい金額を入力');return;}if(this.editSetF==='budget')D.settings.dailyBudget=v;else if(this.editSetF==='limit')D.settings.monthlyLimit=v;else if(this.editSetF==='wife')D.settings.wifeExpenses[mkey()]=v;save();this.cm('mo-set');toast('保存しました ✓');this.render();},

  /* --- CATEGORY --- */
  openCatM(){this.editCatId=null;$('mo-cat-t').textContent='カテゴリを追加';$('mo-cat-btn').textContent='追加';$('i-cn2').value='';$('i-ci2').value='';this.om('mo-cat');},
  editCat(id){this.editCatId=id;const c=gc(id);$('mo-cat-t').textContent='カテゴリを編集';$('mo-cat-btn').textContent='保存';$('i-cn2').value=c.name;$('i-ci2').value=c.icon;this.om('mo-cat');},
  saveCat(){const n=$('i-cn2').value.trim(),i=$('i-ci2').value.trim()||'📌';if(!n){toast('名前を入力');return;}
    if(this.editCatId){const c=D.categories.find(x=>x.id===this.editCatId);if(c){c.name=n;c.icon=i;}}
    else D.categories.push({id:uid(),name:n,icon:i,c:'def'});
    save();this.cm('mo-cat');toast('保存しました ✓');this.render();},
  cfmDelCat(id){if(D.categories.length<=1){toast('最低1つ必要');return;}this.showCfm('カテゴリを削除','削除しますか？','削除する',()=>{D.categories=D.categories.filter(c=>c.id!==id);save();toast('削除しました');this.render();});},

  /* --- CARD --- */
  openCardM(){$('i-crd').value='';this.om('mo-card');},
  addCard(){const n=$('i-crd').value.trim();if(!n){toast('名前を入力');return;}D.cards.push(n);save();this.cm('mo-card');toast('追加しました ✓');this.render();},
  cfmDelCard(i){if(D.cards.length<=1){toast('最低1つ必要');return;}this.showCfm('支払い方法を削除',`${D.cards[i]}を削除しますか？`,'削除する',()=>{D.cards.splice(i,1);save();toast('削除しました');this.render();});},

  /* --- WISHLIST --- */
  openWishM(){$('i-wn').value='';$('i-wp').value='';this.om('mo-wish');},
  addWish(){const n=$('i-wn').value.trim(),p=parseInt($('i-wp').value)||0;if(!n){toast('名前を入力');return;}D.wishlist.push({id:uid(),name:n,price:p});save();this.cm('mo-wish');toast('追加しました ✓');this.render();},
  cfmDelWish(id){this.showCfm('欲しいものを削除','削除しますか？','削除する',()=>{D.wishlist=D.wishlist.filter(w=>w.id!==id);save();toast('削除しました');this.render();});},

  /* --- REWARD USE --- */
  openRwUseM(){$('i-rwa').value='';$('i-rwm').value='';this.om('mo-rwuse');},
  useReward(){const a=parseInt($('i-rwa').value),m=$('i-rwm').value.trim();if(!a||a<=0){toast('金額を入力');return;}D.rewardUses.push({id:uid(),date:today(),amount:a,memo:m});save();this.cm('mo-rwuse');toast('ご褒美使用 ✓');this.render();},

  /* --- EXPORT --- */
  doExport(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`kakeibo_${today()}.json`;a.click();toast('エクスポート完了');}
};

/* ========== EVENT BINDING ========== */
document.querySelectorAll('.tab-i').forEach(t=>t.addEventListener('click',()=>A.go(t.dataset.s)));
$('fab').addEventListener('click',()=>A.openExpM());
$('rw-toggle').addEventListener('click',()=>{const p=$('rw-pan'),c=$('rw-ch');p.classList.toggle('open');c.classList.toggle('open');});
$('btn-wish-add').addEventListener('click',e=>{e.stopPropagation();A.openWishM();});
$('btn-rw-use').addEventListener('click',e=>{e.stopPropagation();A.openRwUseM();});
$('btn-sub-add').addEventListener('click',()=>A.openSubM());
$('btn-inc-add').addEventListener('click',()=>A.openIncM());
$('btn-cat-add').addEventListener('click',()=>A.openCatM());
$('btn-card-add').addEventListener('click',()=>A.openCardM());
$('mo-exp-btn').addEventListener('click',()=>A.addExp());
$('mo-sub-btn').addEventListener('click',()=>A.saveSub());
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)A.cm(m.id);}));
// USD auto-calc
$('i-amt').addEventListener('input',()=>{if(A.expCur==='usd')A.calcJpy();});
$('i-rate').addEventListener('input',()=>A.calcJpy());
$('i-sa').addEventListener('input',()=>{if(A.subCur==='usd')A.calcSubJpy();});
$('i-srate').addEventListener('input',()=>A.calcSubJpy());

/* ========== INIT ========== */
A.render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
